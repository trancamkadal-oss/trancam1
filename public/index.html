<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>The Winner Takes It All</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..700;1,400..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
  
  <style>
    /* ==================== GLOBAL STYLE ==================== */
    body {
      background-image: url('/static/background.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #e2e8f0;
      font-family: 'Inter', system_ui, sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      box-sizing: border-box;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.65);
      z-index: -1;
    }

    /* ==================== CONTAINER UTAMA ==================== */
    .container {
      width: 100%;
      max-width: clamp(280px, 95%, 750px); 
      display: flex;
      flex-direction: column;
      align-items: center;
      box-sizing: border-box;
    }

    /* ==================== HEADER ==================== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between; 
      width: 100%;
      margin-bottom: 20px;
      box-sizing: border-box;
    }
    .hamburger {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header-title-box {
      text-align: center;
      flex: 1;
      padding: 0 10px;
    }
    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 5.5vw, 2.4rem); 
      font-weight: 700;
      color: #f8fafc; 
      margin: 0;
    }
    .current-story {
      font-family: 'EB Garamond', serif;
      font-size: clamp(0.85rem, 2.5vw, 1.05rem);
      font-weight: 600;
      color: #f472b6;
      background: rgba(244, 114, 182, 0.12);
      padding: 4px 14px;
      border-radius: 9999px;
      border: 1px solid #f472b6;
      white-space: nowrap;
      display: inline-block;
      margin-top: 6px;
    }

    /* ==================== STORY BOX ==================== */
    .story-box {
      width: 100%; 
      height: 60vh;
      background: rgba(15, 23, 42, 0.75);
      border: 4px solid #f59e0b;
      border-radius: 24px;
      padding: clamp(18px, 4vw, 32px);
      box-shadow: 0 25px 60px -15px rgb(245 158 11 / 0.4);
      overflow-y: auto;
      position: relative;
      margin-bottom: 24px;
      box-sizing: border-box;
    }
    #typed-text {
      font-family: 'EB Garamond', serif;
      font-size: clamp(1.15rem, 3.5vw, 1.4rem); 
      line-height: 1.6; 
      color: #e2e8f0; 
      white-space: pre-wrap;
    }
    #cursor {
      color: #f59e0b;
      font-weight: 700;
      animation: blink 0.85s step-end infinite;
      display: inline-block;
      margin-left: 4px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ==================== CONTROLS ==================== */
    .controls {
      width: 100%; 
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-sizing: border-box;
    }
    .nav-buttons {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      justify-content: space-between;
    }
    .nav-btn, .play-btn {
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
    }

    /* ==================== SIDEBAR STYLING ==================== */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;                  
      width: 80%;
      max-width: 320px;
      height: 100vh;
      background: rgba(30, 41, 59, 0.95);
      border-right: 1px solid #334155;
      padding: 24px 20px;
      transform: translateX(-100%); 
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 10000;          
      overflow-y: auto;
      backdrop-filter: blur(12px);
      box-sizing: border-box;
    }
    .sidebar.open { 
      transform: translateX(0); 
    }
    .sidebar h3 { color: #a5b4fc; margin-bottom: 18px; font-size: 1.15rem; font-weight: 600; }
    
    .menu-story { 
      margin-bottom: 12px; 
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
      padding-bottom: 8px;
    }

    .menu-story-title { 
      color: #c084fc; 
      font-size: 1.05rem; 
      padding: 10px 6px; 
      font-weight: 600; 
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: color 0.2s;
    }
    .menu-story-title:hover {
      color: #f472b6; 
    }

    .menu-story-title::after {
      content: '▸'; 
      font-size: 0.85rem;
      transition: transform 0.3s;
      color: #94a3b8;
    }
    .menu-story-title.active::after {
      transform: rotate(90deg);
      color: #f472b6;
    }

    .chapters-wrapper {
      max-height: 0;           
      overflow: hidden;        
      transition: max-height 0.35s ease-out; 
      padding-left: 8px;
    }

    .menu-bab button {
      width: 100%;
      text-align: left;
      padding: 10px 16px;
      border-radius: 12px;
      background: none;
      border: none;
      color: #cbd5e1;
      font-size: 0.94rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 4px;
    }
    .menu-bab button:hover { background: rgba(147, 197, 253, 0.12); color: #c084fc; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 999;
      display: none;
    }
    .overlay.show { display: block; }
  </style>
</head>
<body>

  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <div class="sidebar" id="sidebar">
    <h3>📚 Story List</h3>
    <div id="dynamic-menu-box"></div>
  </div>

  <div class="container">
    <div class="header">
      <button class="hamburger" onclick="toggleSidebar()" aria-label="Open Menu">
        <img src="/static/hamburger_icon.png" width="32" height="32" alt="Menu">
      </button>
      <div class="header-title-box">
        <h1>The Winner Takes It All</h1>
        <div class="current-story" id="current-story">Welcome</div>
      </div>
      <div style="width: 32px;"></div>
    </div>

    <div class="story-box" id="story-box">
      <div id="typed-text"></div>
      <span id="cursor">|</span>
    </div>

    <div class="controls">
      <div class="nav-buttons">
        <button class="nav-btn" id="prev-btn" onclick="goToPreviousParagraph()">
          <img src="/static/previous_icon.png" width="32" height="32" alt="Previous">
        </button>
        <button class="play-btn" id="autoplay-btn" onclick="toggleAutoPlay()">
          <img src="/static/playall_icon.png" width="44" height="44" alt="Play">
        </button>
        <button class="nav-btn" id="next-btn" onclick="goToNextParagraph()">
          <img src="/static/next_icon.png" width="32" height="32" alt="Next">
        </button>
      </div>

      <button class="btn-secondary" onclick="clearTextBox()" style="background:none; border:none; padding:0; cursor:pointer;">
        <img src="/static/clear_icon.png" width="32" height="32" alt="Clear">
      </button>

      <div class="speed-control" style="width: 100%; max-width: 300px; display: flex; align-items: center; gap: 10px; margin-top: 10px;">
        <label style="font-size: 0.85rem; color: #94a3b8;">Speed</label>
        <input type="range" id="speed-slider" min="10" max="80" value="25" step="5" style="flex: 1;">
        <span class="speed-value" id="speed-value" style="font-size: 0.85rem; color: #94a3b8;">25 ms</span>
      </div>
    </div>
  </div>

  <script>
    let paragraphs = []; 
    let currentParagraphIndex = 0; 
    let timeoutId = null; 
    let isTyping = false; 
    let isAutoPlaying = false; 
    let autoPlayTimeout = null; 
    
    const typedText = document.getElementById('typed-text'); 
    const cursor = document.getElementById('cursor'); 
    const storyBox = document.getElementById('story-box'); 
    const currentStoryEl = document.getElementById('current-story'); 
    const prevBtn = document.getElementById('prev-btn'); 
    const nextBtn = document.getElementById('next-btn'); 
    const autoplayBtn = document.getElementById('autoplay-btn'); 
    const speedSlider = document.getElementById('speed-slider'); 
    const speedValue = document.getElementById('speed-value'); 

    // TOGGLE SIDEBAR UTAMA
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar'); 
      const overlay = document.getElementById('overlay'); 
      if (sidebar && overlay) { 
        const isClosing = sidebar.classList.contains('open');
        
        sidebar.classList.toggle('open'); 
        overlay.classList.toggle('show'); 
        
        if (isClosing) {
          document.querySelectorAll('.menu-story-title').forEach(el => el.classList.remove('active'));
          document.querySelectorAll('.chapters-wrapper').forEach(el => el.style.maxHeight = '0');
        }
      }
    }

    // GENERATE SIDEBAR ACCORDION DARI BACKEND
    function fetchAndGenerateMenu() {
      fetch('/api/list-stories')
        .then(res => {
          if (!res.ok) throw new Error("Gagal terhubung ke server");
          return res.json();
        })
        .then(data => {
          if (data.status !== 'success') throw new Error(data.message);
          
          const menuBox = document.getElementById('dynamic-menu-box');
          if (!menuBox) return;
          menuBox.innerHTML = ''; 
          
          data.folders.forEach(folderName => {
            const storyDiv = document.createElement('div');
            storyDiv.className = 'menu-story';
            
            const titleDiv = document.createElement('div');
            titleDiv.className = 'menu-story-title';
            titleDiv.textContent = folderName.replace(/_/g, ' '); 
            storyDiv.appendChild(titleDiv);
            
            const wrapperDiv = document.createElement('div');
            wrapperDiv.className = 'chapters-wrapper';
            
            const chapters = [1, 2, 3]; 
            
            chapters.forEach(ch => {
              const babDiv = document.createElement('div');
              babDiv.className = 'menu-bab';
              
              const btn = document.createElement('button');
              btn.textContent = `Chapter ${ch}`;
              btn.onclick = () => loadChapter(folderName, `${ch}.txt`);
              
              babDiv.appendChild(btn);
              wrapperDiv.appendChild(babDiv);
            });
            
            storyDiv.appendChild(wrapperDiv);
            
            titleDiv.onclick = function() {
              const isOpen = titleDiv.classList.contains('active');
              document.querySelectorAll('.menu-story-title').forEach(el => el.classList.remove('active'));
              document.querySelectorAll('.chapters-wrapper').forEach(el => el.style.maxHeight = '0');
              
              if (!isOpen) {
                titleDiv.classList.add('active');
                wrapperDiv.style.maxHeight = wrapperDiv.scrollHeight + "px";
              }
            };
            
            menuBox.appendChild(storyDiv);
          });
        })
        .catch(err => {
          console.error("Gagal memuat daftar cerita:", err);
          const menuBox = document.getElementById('dynamic-menu-box');
          if (menuBox) {
            menuBox.innerHTML = '<p style="color:#94a3b8; font-size:0.9rem; padding:10px;">Gagal memuat daftar dari server.</p>';
          }
        });
    }

    // LOAD TEKS NOVEL DARI BACKEND PYTHON
    function loadChapter(folderName, fileName) {
      fetch(`/api/read-story/${folderName}/${fileName}`)
        .then(res => {
          if (!res.ok) throw new Error(`Cerita ${fileName} tidak ditemukan.`);
          return res.json();
        })
        .then(data => {
          if (data.status === 'error') throw new Error(data.message);
          
          paragraphs = data.content.trim().split(/\n\s*\n+/).filter(p => p.trim()); 
          currentParagraphIndex = 0; 
          
          const cleanFolderName = folderName.replace(/_/g, ' ');
          const cleanFileName = fileName.replace('.txt', '');
          currentStoryEl.textContent = `${cleanFolderName} - Chapter ${cleanFileName}`; 
          
          toggleSidebar(); 
          updateIndicator(); 
          startTypingParagraph(); 
        })
        .catch(err => alert(err.message)); 
    }

    // PARSE BASIC MARKDOWN
    function parseBasicMarkdown(text) {
      let html = text; 
      if (html.match(/^- /m)) {
        html = html.replace(/^- (.*)$/gm, '<li>$1</li>'); 
        html = '<ul style="margin:8px 0; padding-left:20px;">' + html + '</ul>'; 
      }
      const colors = {
        red: "#ff6b6b", blue: "#4dabf7", green: "#69db7c", orange: "#ffa94d",
        purple: "#9775fa", pink: "#f783ac", yellow: "#ffd43b", cyan: "#66d9e8",
        teal: "#38d9a9", indigo: "#748ffc", violet: "#b197fc", lime: "#a9e34b",
        amber: "#ffc078", rose: "#ff8787", sky: "#74c0fc", emerald: "#51cf66", fuchsia: "#e599f7", slate: "#844e96", zinc: "#909296"
      };
      for (const [name, hex] of Object.entries(colors)) {
        html = html.replace(new RegExp(`\\{${name}\\}(.*?)\\{\\/${name}\\}`, 'g'), `<span style="color:${hex}">$1</span>`); 
        html = html.replace(new RegExp(`\\[${name}\\](.*?)\\[\\/${name}\\]`, 'g'), `<span style="color:${hex}">$1</span>`); 
      }
      html = html.replace(/\{large\}(.*?)\{\/large\}/g, '<span style="font-size:1.35em; font-weight:600">$1</span>'); 
      html = html.replace(/\{small\}(.*?)\{\/small\}/g, '<span style="font-size:0.85em">$1</span>'); 
      html = html.replace(/\*\frac{}{}\*\*(.+?)\*\*/g, '<strong>$1</strong>'); 
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>'); 
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>'); 
      html = html.replace(/_(.+?)_/g, '<em>$1</em>'); 
      return html; 
    }

    function updateIndicator() {
      if (prevBtn && nextBtn) {
        prevBtn.disabled = currentParagraphIndex === 0; 
        nextBtn.disabled = currentParagraphIndex === paragraphs.length - 1; 
      }
    }

    // EFEK MESIN KETIK
    function startTypingParagraph() {
      if (isTyping) clearTimeout(timeoutId); 
      isTyping = true; 
      typedText.innerHTML = ''; 
      cursor.style.display = 'inline-block'; 
      const rawText = paragraphs[currentParagraphIndex]; 
      const htmlContent = parseBasicMarkdown(rawText); 
      let i = 0; 
      const speed = parseInt(speedSlider.value); 
      
      function type() {
        if (i < htmlContent.length) { 
          typedText.innerHTML = htmlContent.substring(0, i + 1); 
          i++; 
          storyBox.scrollTop = storyBox.scrollHeight; 
          timeoutId = setTimeout(type, speed); 
        } else {
          isTyping = false; 
          if (isAutoPlaying) { 
            autoPlayTimeout = setTimeout(() => { 
              if (currentParagraphIndex < paragraphs.length - 1) { 
                currentParagraphIndex++; 
                updateIndicator(); 
                startTypingParagraph(); 
              } else {
                isAutoPlaying = false; 
                autoplayBtn.innerHTML = `<img src="/static/playall_icon.png" width="44" height="44" alt="Play">`; 
              }
            }, 2000); 
          }
        }
      }
      type(); 
    }

    function goToNextParagraph() {
      if (paragraphs.length === 0) return; 
      if (isAutoPlaying) { 
        isAutoPlaying = false; 
        if (autoPlayTimeout) clearTimeout(autoPlayTimeout); 
        autoplayBtn.innerHTML = `<img src="/static/playall_icon.png" width="44" height="44" alt="Play">`; 
      }
      if (currentParagraphIndex < paragraphs.length - 1) { 
        currentParagraphIndex++; 
        updateIndicator(); 
        startTypingParagraph(); 
      }
    }

    function goToPreviousParagraph() {
      if (paragraphs.length === 0) return; 
      if (isAutoPlaying) { 
        isAutoPlaying = false; 
        if (autoPlayTimeout) clearTimeout(autoPlayTimeout); 
        autoplayBtn.innerHTML = `<img src="/static/playall_icon.png" width="44" height="44" alt="Play">`; 
      }
      if (currentParagraphIndex > 0) { 
        currentParagraphIndex--; 
        updateIndicator(); 
        startTypingParagraph(); 
      }
    }

    function restartCurrentParagraph() {
      if (paragraphs.length === 0) return; 
      if (isAutoPlaying) { 
        isAutoPlaying = false; 
        if (autoPlayTimeout) clearTimeout(autoPlayTimeout); 
        autoplayBtn.innerHTML = `<img src="/static/playall_icon.png" width="44" height="44" alt="Play">`; 
      }
      startTypingParagraph(); 
    }

    function toggleAutoPlay() {
      if (paragraphs.length === 0) return; 
      if (isAutoPlaying) { 
        isAutoPlaying = false; 
        if (autoPlayTimeout) clearTimeout(autoPlayTimeout); 
        autoplayBtn.innerHTML = `<img src="/static/playall_icon.png" width="44" height="44" alt="Play">`; 
      } else {
        isAutoPlaying = true; 
        autoplayBtn.innerHTML = `<img src="/static/stop_icon.png" width="44" height="44" alt="Stop">`; 
        startTypingParagraph(); 
      }
    }

    function clearTextBox() {
      if (timeoutId) clearTimeout(timeoutId); 
      if (autoPlayTimeout) clearTimeout(autoPlayTimeout); 
      isTyping = false; isAutoPlaying = false; 
      autoplayBtn.innerHTML = `<img src="/static/playall_icon.png" width="44" height="44" alt="Play">`; 
      typedText.innerHTML = ''; cursor.style.display = 'none'; 
      paragraphs = []; currentParagraphIndex = 0; 
      currentStoryEl.textContent = "Welcome"; 
      updateIndicator(); 
    }

    if (speedSlider) {
      speedSlider.addEventListener('input', () => { 
        document.getElementById('speed-value').textContent = speedSlider.value + ' ms'; 
      });
    }

    document.addEventListener('keydown', e => { 
      if (e.key === 'ArrowRight') goToNextParagraph(); 
      if (e.key === 'ArrowLeft') goToPreviousParagraph(); 
      if (e.key.toLowerCase() === 'r') restartCurrentParagraph(); 
      if (e.key === "Escape") { 
        const sidebar = document.getElementById('sidebar'); 
        if (sidebar && sidebar.classList.contains('open')) toggleSidebar(); 
      }
    });

    window.onload = function() { 
      fetchAndGenerateMenu(); 
      if (currentStoryEl) currentStoryEl.textContent = "Welcome"; 
      if (typedText) typedText.innerHTML = 'Silakan buka sidebar untuk memilih cerita...'; 
      if (cursor) cursor.style.display = 'none'; 
      updateIndicator(); 
    }
  </script>
</body>
</html>
